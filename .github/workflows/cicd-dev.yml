name: CI/CD dev (build + push + update manifests)

on:
  push:
    branches: [ main ]

jobs:
  build_images:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: frontend
            path: ./src/frontend
          - name: adservice
            path: ./src/adservice
          - name: cartservice
            path: ./src/cartservice/src
          - name: checkoutservice
            path: ./src/checkoutservice
          - name: currencyservice
            path: ./src/currencyservice
          - name: emailservice
            path: ./src/emailservice
          - name: loadgenerator
            path: ./src/loadgenerator
          - name: paymentservice
            path: ./src/paymentservice
          - name: productcatalogservice
            path: ./src/productcatalogservice
          - name: recommendationservice
            path: ./src/recommendationservice
          - name: shippingservice
            path: ./src/shippingservice
      # Build có thể chạy song song, nhưng không chạm vào branch manifests.
      max-parallel: 4
      fail-fast: false

    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout code repo
        uses: actions/checkout@v4

      - name: Đăng nhập DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build & push image ${{ matrix.service.name }}
        run: |
          IMAGE_NAME="figbugmely/onlineboutique-${{ matrix.service.name }}"
          IMAGE_TAG="${{ github.sha }}"
          docker build -t "$IMAGE_NAME:$IMAGE_TAG" "${{ matrix.service.path }}"
          docker push "$IMAGE_NAME:$IMAGE_TAG"

  update_manifests_dev:
    runs-on: ubuntu-latest
    needs: build_images

    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      MANIFESTS_REPO: lovelybugf/demo_microservice_manifest
      MANIFESTS_BRANCH: env/dev

    steps:
      - name: Checkout repo manifests (nhánh env/dev)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFESTS_REPO }}
          token: ${{ secrets.MANIFESTS_REPO_PAT }}
          ref: ${{ env.MANIFESTS_BRANCH }}
          path: manifests

      - name: Cập nhật tag image trong Kustomize base cho tất cả service
        working-directory: manifests
        run: |
          set -euo pipefail
          TAG="${{ github.sha }}"
          PREFIX="figbugmely/onlineboutique"

          SERVICES=(
            frontend
            adservice
            cartservice
            checkoutservice
            currencyservice
            emailservice
            loadgenerator
            paymentservice
            productcatalogservice
            recommendationservice
            shippingservice
          )

          for svc in "${SERVICES[@]}"; do
            FILE="kustomize/base/${svc}.yaml"
            if [ -f "$FILE" ]; then
              IMAGE_NAME="${PREFIX}-${svc}"
              # Thay toàn bộ dòng image: ... thành image mới
              sed -i "s|image: .*${svc}:.*|image: ${IMAGE_NAME}:${TAG}|" "$FILE"
            else
              echo "Không thấy $FILE, bỏ qua $svc"
            fi
          done

      - name: Commit và push thay đổi sang env/dev (tiếng Việt)
        working-directory: manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi manifests để commit."
            exit 0
          fi

          git pull --rebase origin "$MANIFESTS_BRANCH" || true

          git add kustomize/base
          git commit -m "CI: cập nhật image lên nhánh env/dev (${{ github.sha }})"
          git push origin "$MANIFESTS_BRANCH"

