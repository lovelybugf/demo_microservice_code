name: CI/CD dev (build + push + update manifests)

on:
  push:
    branches: [ main ]

jobs:
  build_push_and_update_manifests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - name: frontend
            path: ./src/frontend
          - name: adservice
            path: ./src/adservice
          - name: cartservice
            path: ./src/cartservice/src
          - name: checkoutservice
            path: ./src/checkoutservice
          - name: currencyservice
            path: ./src/currencyservice
          - name: emailservice
            path: ./src/emailservice
          - name: loadgenerator
            path: ./src/loadgenerator
          - name: paymentservice
            path: ./src/paymentservice
          - name: productcatalogservice
            path: ./src/productcatalogservice
          - name: recommendationservice
            path: ./src/recommendationservice
          - name: shippingservice
            path: ./src/shippingservice
      # Tránh race condition: nhiều job matrix cùng push vào một branch `env/dev`.
      # Chạy tuần tự để mỗi job push xong thì job tiếp theo mới bắt đầu.
      max-parallel: 1
      fail-fast: false

    env:
      DOCKERHUB_USER: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      MANIFESTS_REPO: lovelybugf/demo_microservice_manifest
      MANIFESTS_BRANCH: env/dev

    steps:
      - name: Checkout code repo
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USER }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build Docker image ${{ matrix.service.name }}
        run: |
          IMAGE_NAME="figbugmely/onlineboutique-${{ matrix.service.name }}"
          IMAGE_TAG="${{ github.sha }}"
          docker build -t "$IMAGE_NAME:$IMAGE_TAG" "${{ matrix.service.path }}"

      - name: Push Docker image ${{ matrix.service.name }}
        run: |
          IMAGE_NAME="figbugmely/onlineboutique-${{ matrix.service.name }}"
          IMAGE_TAG="${{ github.sha }}"
          docker push "$IMAGE_NAME:$IMAGE_TAG"

      - name: Checkout manifests repo (env/dev)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MANIFESTS_REPO }}
          token: ${{ secrets.MANIFESTS_REPO_PAT }}   # PAT có quyền push
          ref: ${{ env.MANIFESTS_BRANCH }}
          path: manifests

      - name: Cập nhật tag image trong manifests cho ${{ matrix.service.name }}
        working-directory: manifests
        run: |
          IMAGE_NAME="figbugmely/onlineboutique-${{ matrix.service.name }}"
          IMAGE_TAG="${{ github.sha }}"
          FILE="kustomize/base/${{ matrix.service.name }}.yaml"

          # Nếu file tồn tại thì mới sửa
          if [ -f "$FILE" ]; then
            sed -i "s|image: .*${{ matrix.service.name }}:.*|image: $IMAGE_NAME:$IMAGE_TAG|" "$FILE"
          else
            echo "File $FILE không tồn tại, bỏ qua."
          fi

      - name: Commit và push thay đổi vào env/dev
        working-directory: manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "Không có thay đổi manifests để commit."
            exit 0
          fi

          # Lấy commit mới nhất trên remote trước khi push (phòng trường hợp có người/CI push song song).
          git pull --rebase origin "$MANIFESTS_BRANCH" || true

          git add kustomize/base
          git commit -m "ci: cap nhat images len ${{ github.sha }}"
          git push origin $MANIFESTS_BRANCH

